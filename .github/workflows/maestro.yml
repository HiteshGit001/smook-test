name: Maestro Tests

on:
  workflow_dispatch:

jobs:
  maestro-test:
    name: Run Maestro Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      #########################################################
      # CHECKOUT
      #########################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      #########################################################
      # JAVA
      #########################################################

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      #########################################################
      # MAESTRO
      #########################################################

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Verify Maestro installation
        run: maestro --version

      #########################################################
      # ENABLE KVM
      #########################################################

      - name: Enable KVM
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            qemu-kvm \
            libvirt-daemon-system \
            libvirt-clients \
            bridge-utils \
            libpulse0

          sudo chmod 666 /dev/kvm

      #########################################################
      # CREATE TEST SCRIPT
      #########################################################

      - name: Create test script
        run: |
          cat > run_tests.sh << 'EOF'
          #!/bin/bash

          set -e

          mkdir -p debug-artifacts

          on_exit() {
            adb exec-out screencap -p > debug-artifacts/on-exit.png || true
          }

          trap on_exit EXIT

          echo "Waiting for emulator..."

          adb wait-for-device

          BOOT_STATUS=""

          until [[ "$BOOT_STATUS" == "1" ]]; do
            BOOT_STATUS=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "Boot status: $BOOT_STATUS"
            sleep 5
          done

          echo "Emulator boot completed"

          adb devices

          echo "Downloading APK..."

          wget -O app.apk "$APK_URL"

          echo "Installing APK..."

          adb install -r app.apk

          echo "Launching app..."

          adb shell monkey -p in.cuonlineedu.lms -c android.intent.category.LAUNCHER 1

          sleep 20

          adb exec-out screencap -p > debug-artifacts/pre-test.png || true

          echo "Running Maestro..."

          maestro test --debug-output debug-artifacts "apps/$APP_NAME/"

          EOF

          chmod +x run_tests.sh

      #########################################################
      # RUN EMULATOR
      #########################################################

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2

        env:
          APP_NAME: chandigarh
          APK_URL: https://github.com/HiteshGit001/smook-test/releases/download/ci-build-1318/app-chandigarh-release.apk

        with:
          api-level: 30

          target: default

          arch: x86_64

          profile: pixel_5

          force-avd-creation: true

          emulator-boot-timeout: 1200

          disable-animations: true

          emulator-options: >
            -no-window
            -gpu off
            -noaudio
            -no-boot-anim
            -camera-back none
            -camera-front none
            -no-snapshot
            -wipe-data

          script: |
            adb start-server
            adb devices
            bash run_tests.sh

      #########################################################
      # UPLOAD ARTIFACTS
      #########################################################

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4

        with:
          name: maestro-artifacts

          path: debug-artifacts/

          retention-days: 14