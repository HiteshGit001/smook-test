name: Maestro Tests

on:
  workflow_dispatch:
    # inputs:
    #   app:
    #     description: 'App to test (e.g. atlas, chandigarh)'
    #     required: true
    #     type: choice
    #     options:
    #       - atlas
    #       - chandigarh
    #
    #   apk_url:
    #     description: 'Direct download URL for the APK'
    #     required: true
    #     type: string

jobs:
  maestro-test:
    name: Run Maestro Tests for ${{ github.event.inputs.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      #########################################################
      # CHECKOUT
      #########################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      #########################################################
      # JAVA
      #########################################################

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      #########################################################
      # MAESTRO
      #########################################################

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Verify Maestro installation
        run: maestro --version

      #########################################################
      # ENABLE KVM
      #########################################################

      - name: Enable KVM
        run: |
          sudo chmod 666 /dev/kvm || true

      #########################################################
      # RUN TESTS
      #########################################################

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2

        env:
          APP_NAME: chandigarh
          APK_URL: https://github.com/HiteshGit001/smook-test/releases/download/ci-build-1318/app-chandigarh-release.apk

          # APP_NAME: ${{ github.event.inputs.app }}
          # APK_URL: ${{ github.event.inputs.apk_url }}

        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true

          script: |
            mkdir -p debug-artifacts

            echo "ADB devices:"
            adb devices

            echo "Waiting for emulator..."
            adb wait-for-device

            echo "Downloading APK..."
            wget -O app.apk "$APK_URL"

            echo "APK details:"
            ls -lh app.apk
            file app.apk

            echo "Installing APK..."
            adb install -r app.apk

            echo "Launching app..."
            adb shell monkey -p in.cuonlineedu.lms -c android.intent.category.LAUNCHER 1
            sleep 10

            echo "Taking pre-test screenshot..."
            adb exec-out screencap -p > debug-artifacts/pre-test.png || true

            echo "Running Maestro..."
            maestro test \
              --debug-output debug-artifacts \
              apps/$APP_NAME/

      #########################################################
      # UPLOAD ARTIFACTS
      #########################################################

      - name: Upload Maestro test artifacts
        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: maestro-artifacts-chandigarh
          path: debug-artifacts/
          retention-days: 14