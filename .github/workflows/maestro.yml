name: Maestro Tests

on:
  workflow_dispatch:
    # inputs:
    #   app:
    #     description: 'App to test (e.g. atlas, chandigarh)'
    #     required: true
    #     type: choice
    #     options:
    #       - atlas
    #       - chandigarh
    #   apk_url:
    #     description: 'Direct download URL for the APK'
    #     required: true
    #     type: string

jobs:
  maestro-test:
    name: Run Maestro Tests for ${{ github.event.inputs.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro installation
        run: maestro --version

      - name: Install emulator dependencies
        run: sudo apt-get install -y libpulse0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create test script
        run: |
          cat > run_tests.sh << 'EOF'
          #!/bin/bash
          set -e

          mkdir -p debug-artifacts

          # Always take a screenshot on exit (pass or fail)
          on_exit() {
            adb exec-out screencap -p > debug-artifacts/on-exit.png || true
            ls -lh debug-artifacts/
          }
          trap on_exit EXIT

          adb devices

          wget -O app.apk "$APK_URL"
          ls -lh app.apk
          file app.apk

          adb install app.apk

          # Pre-test screenshot
          adb shell monkey -p in.cuonlineedu.lms -c android.intent.category.LAUNCHER 1
          sleep 15
          adb exec-out screencap -p > debug-artifacts/01-pre-test.png

          # Run maestro — exits with maestro's exit code if it fails
          maestro test --debug-output debug-artifacts apps/$APP_NAME/
          EOF
          chmod +x run_tests.sh

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          APP_NAME: chandigarh
          APK_URL: https://github.com/HiteshGit001/smook-test/releases/download/ci-build-1318/app-chandigarh-release.apk
          # APP_NAME: ${{ github.event.inputs.app }}
          # APK_URL: ${{ github.event.inputs.apk_url }}
        with:
          api-level: 30
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          ram-size: 6144M
          heap-size: 2048M
          disk-size: 16384M
          cores: 2
          emulator-options: -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect -camera-back none -camera-front none
          script: bash run_tests.sh

      - name: Upload Maestro test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-chandigarh
          path: debug-artifacts/
          retention-days: 14