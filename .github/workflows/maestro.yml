name: Maestro Tests

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to test (e.g. atlas, chandigarh)'
        required: true
        type: choice
        options:
          - atlas
          - chandigarh

jobs:
  maestro-test:
    name: Run Maestro Tests for ${{ github.event.inputs.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro installation
        run: maestro --version

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb devices

            wget -O app.apk "https://ueducation-my.sharepoint.com/:u:/g/personal/hitesh_nanjappa_upgrad_com/IQDSDNDZgOu9TKlfCiERmcA0ATdWfxhNHIs_RsPIq2GdS_s?download=1"

            ls -lh app.apk
            file app.apk

            adb install app.apk

            mkdir -p debug-artifacts

            # Pre-test screenshot: launch the app, wait, and capture screen.
            # This is the reliable screenshot — guaranteed to be on disk
            # before maestro runs.
            adb shell monkey -p in.cuonlineedu.lms -c android.intent.category.LAUNCHER 1
            sleep 8
            adb exec-out screencap -p > debug-artifacts/01-pre-test.png

            # Run maestro
            TEST_EXIT=0
            maestro test --debug-output debug-artifacts apps/${{ github.event.inputs.app }}/ || TEST_EXIT=$?

            # Post-test screenshot: best-effort capture of the final state.
            adb exec-out screencap -p > debug-artifacts/02-post-test.png || true
            ls -lh debug-artifacts/

            exit $TEST_EXIT

      - name: Upload Maestro test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-${{ github.event.inputs.app }}
          path: debug-artifacts/
          retention-days: 14