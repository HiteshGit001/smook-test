name: Maestro Tests

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to test (e.g. atlas, chandigarh)'
        required: true
        type: choice
        options:
          - atlas
          - chandigarh
      apk_url:
        description: 'Direct download URL for the APK'
        required: true
        type: string

jobs:
  maestro-test:
    name: Run Maestro Tests for ${{ github.event.inputs.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro installation
        run: maestro --version

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 8192M
          script: |
            set -e

            # Always capture a screenshot and list artifacts on exit,
            # whether the test passes or fails. Exit code is preserved.
            mkdir -p debug-artifacts
            on_exit() {
              adb exec-out screencap -p > debug-artifacts/on-exit.png || true
              ls -lh debug-artifacts/
            }
            trap on_exit EXIT

            adb devices

            wget -O app.apk "${{ github.event.inputs.apk_url }}"
            ls -lh app.apk
            file app.apk

            adb install app.apk

            # Pre-test screenshot
            adb shell monkey -p in.cuonlineedu.lms -c android.intent.category.LAUNCHER 1
            sleep 10
            adb exec-out screencap -p > debug-artifacts/01-pre-test.png

            # Run maestro — script exits here with maestro's exit code if it fails
            maestro test --debug-output debug-artifacts apps/${{ github.event.inputs.app }}/

      - name: Upload Maestro test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-${{ github.event.inputs.app }}
          path: debug-artifacts/
          retention-days: 14