name: Maestro Tests

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  maestro-test:
    name: Run Maestro Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      #########################################################
      # CHECKOUT
      #########################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      #########################################################
      # JAVA
      #########################################################

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      #########################################################
      # MAESTRO
      #########################################################

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Verify Maestro installation
        run: maestro --version

      #########################################################
      # ENABLE KVM
      #########################################################

      - name: Enable KVM
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            qemu-kvm \
            libvirt-daemon-system \
            libvirt-clients \
            bridge-utils \
            libpulse0

          sudo chmod 666 /dev/kvm

      #########################################################
      # CREATE TEST SCRIPT
      #########################################################

      - name: Create test script
        run: |
          cat > run_tests.sh << 'EOF'
          #!/bin/bash

          set -eo pipefail

          mkdir -p debug-artifacts

          on_exit() {
            echo "=== TAKING FINAL SCREENSHOT ==="
            adb exec-out screencap -p > debug-artifacts/on-exit.png || true

            echo "=== SAVING LOGCAT ==="
            adb logcat -d > debug-artifacts/logcat.txt || true
          }

          trap on_exit EXIT

          echo "====================================="
          echo "WAITING FOR EMULATOR"
          echo "====================================="

          adb wait-for-device

          BOOT_STATUS=""

          until [[ "$BOOT_STATUS" == "1" ]]; do
            BOOT_STATUS=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "Boot status: $BOOT_STATUS"
            sleep 5
          done

          echo "====================================="
          echo "EMULATOR READY"
          echo "====================================="

          adb devices

          echo "====================================="
          echo "DISABLING ANIMATIONS"
          echo "====================================="

          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

          echo "====================================="
          echo "CLEARING LOGCAT"
          echo "====================================="

          adb logcat -c

          echo "====================================="
          echo "DOWNLOADING APK"
          echo "====================================="

          wget -O app.apk "$APK_URL"

          ls -lh app.apk

          echo "====================================="
          echo "INSTALLING APK"
          echo "====================================="

          adb install -r app.apk

          echo "====================================="
          echo "VERIFY PACKAGE"
          echo "====================================="

          adb shell pm list packages | grep cuonlineedu || true

          echo "====================================="
          echo "LAUNCHING APP"
          echo "====================================="

          adb shell monkey -p in.cuonlineedu.lms -c android.intent.category.LAUNCHER 1

          echo "====================================="
          echo "WAITING AFTER APP LAUNCH"
          echo "====================================="

          sleep 25

          echo "====================================="
          echo "TAKING PRE-TEST SCREENSHOT"
          echo "====================================="

          adb exec-out screencap -p > debug-artifacts/pre-test.png || true

          echo "====================================="
          echo "CHECKING FOR CRASH"
          echo "====================================="

          if adb logcat -d | grep -i "FATAL EXCEPTION"; then
            echo "====================================="
            echo "FULL CRASH LOG"
            echo "====================================="

            adb logcat -d | tail -200

            exit 1
          fi

          echo "====================================="
          echo "RUNNING MAESTRO"
          echo "====================================="

          maestro test \
            --debug-output debug-artifacts \
            "apps/$APP_NAME/"

          EOF

          chmod +x run_tests.sh

      #########################################################
      # RUN EMULATOR
      #########################################################

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2

        env:
          APP_NAME: chandigarh
          APK_URL: https://ueducation-my.sharepoint.com/:u:/g/personal/hitesh_nanjappa_upgrad_com/IQAvBfWMRE8bR5AAzFMsLbLBAViV6f-Fj1zGrrLZET-AL88?e=U8EAxX

        with:
          api-level: 30
          target: google_apis
          arch: x86_64

          profile: pixel_5

          force-avd-creation: true

          emulator-boot-timeout: 12000

          disable-animations: true

          emulator-options: >
            -no-snapshot
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -camera-back none
            -camera-front none

          script: |
            adb start-server
            adb devices
            bash run_tests.sh

      #########################################################
      # UPLOAD ARTIFACTS
      #########################################################

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4

        with:
          name: maestro-artifacts

          path: debug-artifacts/

          retention-days: 14