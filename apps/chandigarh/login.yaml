appId: in.cuonlineedu.lms
---
- launchApp:
    clearState: true

#########################################################
# WAIT FOR APP TO LOAD
#########################################################

# Wait until either Skip OR Username appears
- extendedWaitUntil:
    visible:
      text: 'Skip'
    timeout: 150000
    optional: true

#########################################################
# HANDLE OPTIONAL SKIP
#########################################################

- tapOn:
    text: 'Skip'
    optional: true

#########################################################
# WAIT FOR LOGIN SCREEN
#########################################################

- extendedWaitUntil:
    visible:
      text: 'Username'
    timeout: 30000

#########################################################
# SCREENSHOT
#########################################################

- takeScreenshot: 02-login-screen

#########################################################
# LOGIN
#########################################################

- tapOn:
    text: 'Username'

- inputText: 'demo_shivansh'

- tapOn:
    text: 'Password'

- inputText: 'demo_shivansh_1'

- hideKeyboard

#########################################################
# SIGN IN
#########################################################

- tapOn: 'Sign In'

#########################################################
# WAIT FOR HOME SCREEN
#########################################################

- extendedWaitUntil:
    visible:
      text: 'Select the course you want to continue learning from'
    timeout: 30000

#########################################################
# TAP COURSE
#########################################################

- tapOn:
    point: '25%,42%'
