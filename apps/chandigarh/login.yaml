appId: in.cuonlineedu.lms
---
- launchApp:
    clearState: true

# Wait for onboarding screen, then skip it
- extendedWaitUntil:
    visible: 'Skip'
    timeout: 10000
- tapOn: 'Skip'

# Capture the login screen so we can see what field labels are actually used
- takeScreenshot: 02-login-screen

# Wait until the login screen is actually visible
- extendedWaitUntil:
    visible: 'Username'
    timeout: 20000

# Fill in the login credentials
- tapOn:
    text: 'Username'
- inputText: 'demo_shivansh'

- tapOn:
    text: 'Password'
- inputText: 'demo_shivansh_1'
- hideKeyboard

# Click on the login / sign-in button
- tapOn: 'Sign In'

- extendedWaitUntil:
    visible: 'Select the course you want to continue learning from'
    timeout: 10000

- tapOn:
    point: '25%,42%'
