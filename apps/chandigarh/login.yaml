appId: in.cuonlineedu.lms
---
- launchApp:
    clearState: true

# Skip the intro banner if visible (optional)
- tapOn:
    text: 'Skip'
    optional: true

# Wait until the login screen is actually visible.
# Match common labels for the username field.
- extendedWaitUntil:
    visible:
      text: 'Username'
    timeout: 20000

# Fill in the login credentials
- tapOn:
    text: 'Username'
- inputText: 'demo_shivansh'

- tapOn:
    text: 'Password'
- inputText: 'demo_shivansh_1'
- hideKeyboard

# Click on the login / sign-in button
- tapOn: 'Sign In'

- extendedWaitUntil:
    visible: 'Select the course you want to continue learning from'
    timeout: 10000

- tapOn:
    point: '25%,42%'
